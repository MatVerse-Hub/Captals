name: CIN Trust Router

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: captals/cin-digital-trust-router
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --ignore-scripts
      - run: npm run check
      - run: npm test
